<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — CodeAlpha Social</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
</head>
<body>
  <div class="app-shell" style="padding-bottom: 80px">
    <div class="top-header">
      <a href="feed.html" class="header-icon-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"></path>
          <path d="M12 19l-7-7 7-7"></path>
        </svg>
      </a>
      <div class="logo" style="font-size:18px">Post</div>
      <div style="width:40px"></div>
    </div>

    <div id="post-slot">
      <div class="loading-spinner">Loading post...</div>
    </div>

    <div class="page-title" style="margin-top:10px">Comments</div>
    <div id="comments-slot"></div>
  </div>

  <div class="comment-input-row">
    <input type="text" id="comment-input" placeholder="Add a comment...">
    <button id="comment-submit">Post</button>
  </div>

  <script src="js/api.js"></script>
  <script src="js/postcard.js"></script>
  <script src="js/post.js"></script>
</body>
</html>
