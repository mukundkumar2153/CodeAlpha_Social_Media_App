<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripple — Mini Social Media</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="authView" class="auth-wrapper">
  <div class="auth-card">
    <h1 class="brand">🌊 Ripple</h1>
    <p class="tagline">Share small moments.</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Log In</button>
      <button class="tab-btn" data-tab="register">Sign Up</button>
    </div>

    <form id="loginForm" class="auth-form">
      <input type="text" id="loginUsername" placeholder="Username or email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Log In</button>
      <p class="form-error" id="loginError"></p>
    </form>

    <form id="registerForm" class="auth-form hidden">
      <input type="text" id="regUsername" placeholder="Username" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="password" id="regPassword" placeholder="Password (min 6 chars)" required>
      <button type="submit">Create Account</button>
      <p class="form-error" id="registerError"></p>
    </form>
  </div>
</div>

<div id="appView" class="app-wrapper hidden">
  <header class="topbar">
    <h1 class="brand">🌊 Ripple</h1>
    <nav class="topnav">
      <button id="navFeedBtn" class="nav-link active">Feed</button>
      <button id="navExploreBtn" class="nav-link">Explore</button>
      <button id="navProfileBtn" class="nav-link">My Profile</button>
      <button id="logoutBtn" class="nav-link logout">Log Out</button>
    </nav>
  </header>

  <main class="main-grid">
    <section class="feed-col">

      <div id="composer" class="card composer">
        <textarea id="postContent" placeholder="What's happening?" maxlength="500"></textarea>
        <div class="composer-row">
          <input type="url" id="postImage" placeholder="Image URL (optional)">
          <button id="submitPostBtn">Post</button>
        </div>
      </div>

      <div class="feed-toggle">
        <button id="toggleAllBtn" class="pill active">All Posts</button>
        <button id="toggleFollowingBtn" class="pill">Following</button>
      </div>

      <div id="postsList" class="posts-list"></div>
    </section>

    <aside class="side-col">
      <div id="profilePanel" class="card profile-panel"></div>
    </aside>
  </main>
</div>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
