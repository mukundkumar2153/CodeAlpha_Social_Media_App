<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAlpha Social</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">CodeAlpha</div>
    <div class="auth-tagline">Share your moments, follow your people</div>

    <div id="form-error" class="form-error"></div>

    <!-- LOGIN FORM -->
    <form id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-gradient" id="login-btn">Log in</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" style="display:none">
      <div class="field">
        <label>Username</label>
        <input type="text" id="reg-username" required placeholder="yourname">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-password" required placeholder="At least 6 characters">
      </div>
      <div class="field">
        <label>Bio (optional)</label>
        <input type="text" id="reg-bio" placeholder="Tell people about yourself">
      </div>
      <button type="submit" class="btn-gradient" id="register-btn">Create account</button>
    </form>

    <div class="switch-mode">
      <span id="mode-text">Don't have an account?</span>
      <span id="mode-toggle">Sign up</span>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
