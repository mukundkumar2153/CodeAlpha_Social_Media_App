<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore — CodeAlpha Social</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
</head>
<body>
  <div class="app-shell">
    <div class="top-header">
      <a href="feed.html" class="header-icon-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"></path>
          <path d="M12 19l-7-7 7-7"></path>
        </svg>
      </a>
      <div class="logo" style="font-size:18px">Explore</div>
      <button class="header-icon-btn" onclick="Auth.logout()"><i class="ti ti-logout"></i></button>
    </div>

    <div class="search-bar-wrap">
      <input type="text" id="user-search-input" placeholder="Search users by username...">
    </div>

    <div id="search-results-slot"></div>

    <div id="explore-slot" class="explore-grid">
      <div class="loading-spinner">Loading posts...</div>
    </div>

    <nav class="bottom-nav" id="bottom-nav-slot"></nav>
  </div>

  <script src="js/api.js"></script>
  <script src="js/postcard.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/gridthumb.js"></script>
  <script src="js/explore.js"></script>
</body>
</html>
